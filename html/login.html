<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login | Docsify</title>
    <link rel="stylesheet" href="../css/login.css">
</head>

<body>

<div class="container">

    <div class="form-header">
        <h2>Log In</h2>
        <p>Welcome back to Docsify</p>
    </div>

    <form id="login-form">

        <div class="form-item">
            <input type="email" id="username" required placeholder=" ">
            <label for="username">Enter Email</label>
        </div>
        
        <div class="form-item">
            <input type="password" id="userpass" required placeholder=" ">
            <label for="userpass">Enter Password</label>
        </div>

        <button type="submit" id="submit-btn">Log In</button>

        <p>Don't have an account? <a href="signin.html">Sign Up</a></p>

    </form>
<script src="../scripts/login.js"></script>
</div>

</body>
</html>
