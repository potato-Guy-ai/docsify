<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Profile | Docsify</title>
    <link rel="stylesheet" href="css/theme.css">
    <link rel="stylesheet" href="css/profile.css">
</head>

<body>

    <!-- Overlay -->
    <div class="overlay" id="overlay"></div>

    <!-- Sidebar -->
    <div class="sidebar" id="sidebar">

        <h2 class="logo">Docsify</h2>

        <a href="generator.html">Generator</a>
        <a href="history.html">History</a>
        <a href="profile.html">Profile</a>
        <a href="settings.html">Settings</a>
        <a href="#">Logout</a>

    </div>

    <!-- Hamburger -->
    <div class="hamburger" id="hamburger">☰</div>

    <div class="container">

        <section class="profile-header">

            <img class="avatar" src="../resources/default-user1.jpg" alt="User Avatar">

            <h2 class="display-name" id="display-name">Loading...</h2>

            <p class="email" id="email">Loading...</p>

            <p class="join-date" id="join-date">Loading...</p>

        </section>

        <hr>

        <section class="account-info">

            <h3 class="section-title">Account Information</h3>

            <div class="info-row">
                <span class="label">Username</span>
                <span class="value username" id="username">Loading...</span>
            </div>

            <div class="info-row">
                <span class="label">Email</span>
                <span class="value useremail" id="useremail">Loading...</span>
            </div>

        </section>

    </div>
    <script src="scripts/auth.js"></script>
    <script src="scripts/theme.js"></script>

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js"></script>
    <script src="scripts/supabase.js"></script>

    <script src="scripts/sidebar.js"></script>
    <script src="scripts/profile.js"></script>
</body>

</html>
