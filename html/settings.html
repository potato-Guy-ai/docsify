<!DOCTYPE html>
<html lang="en">

<head>

    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Settings | Docsify</title>

    <link rel="stylesheet" href="../css/theme.css">
    <link rel="stylesheet" href="../css/settings.css">

</head>

<body>

    <!-- Overlay -->
    <div class="overlay" id="overlay"></div>


    <!-- Sidebar -->
    <div class="sidebar" id="sidebar">

        <h2 class="logo">Docsify</h2>

        <a href="generator.html">Generator</a>
        <a href="history.html">History</a>
        <a href="profile.html">Profile</a>
        <a href="settings.html">Settings</a>
        <a href="#" id="logout-btn">Logout</a>

    </div>


    <!-- Hamburger -->
    <div class="hamburger" id="hamburger">☰</div>



    <div class="container">

        <h1 class="title">Settings</h1>


        <!-- Appearance -->
        <section class="settings-section">

            <h3>Appearance</h3>

            <div class="setting-item">

                <label>Theme</label>

                <div class="theme-options">

                    <label>
                        <input type="radio" name="theme" value="dark" checked>
                        Dark
                    </label>

                    <label>
                        <input type="radio" name="theme" value="light">
                        Light
                    </label>

                </div>

            </div>

        </section>


        <!-- Security -->
        <section class="settings-section">

            <h3>Security</h3>

            <div class="setting-item">
                <button class="change-password">Change Password</button>
            </div>

        </section>


        <!-- Data -->
        <section class="settings-section">

            <h3>Data</h3>

            <div class="setting-item">
                <button class="clear-history">Clear History</button>
            </div>

        </section>


        <!-- Danger Zone -->
        <section class="settings-section danger">

            <h3>Danger Zone</h3>

            <div class="setting-item">
                <button class="delete-account">Delete Account</button>
            </div>

        </section>

    </div>



    <!-- PASSWORD MODAL -->
    <div class="modal" id="password-modal">

        <div class="modal-card">

            <h3>Change Password</h3>

            <input type="password" id="old-pass" placeholder="Enter old password">
            <input type="password" id="new-pass" placeholder="Enter new password">

            <div class="modal-actions">

                <button id="cancel-pass">Cancel</button>
                <button id="update-pass">Update Password</button>

            </div>

        </div>

    </div>



    <!-- DELETE ACCOUNT MODAL -->
    <div class="modal" id="delete-modal">

        <div class="modal-card danger-card">

            <h3>Delete Account</h3>

            <p>
                This action is <b>permanent</b>.
                All your data will be deleted.
            </p>

            <div class="modal-actions">

                <button id="cancel-delete">Cancel</button>
                <button id="confirm-delete">Delete Account</button>

            </div>

        </div>

    </div>



    <script src="../scripts/auth.js"></script>
    <script src="../scripts/sidebar.js"></script>

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js"></script>
    <script src="../scripts/supabase.js"></script>

    <script src="../scripts/settings.js"></script>
    <script src="../scripts/theme.js"></script>

</body>

</html>
