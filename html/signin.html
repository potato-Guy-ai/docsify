<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sign In | Docsify</title>
    <link rel="stylesheet" href="../css/signin.css">
</head>
<body>
    <div class="container">

    <div class="form-header">
        <h2>Sign In</h2>
        <p>Access your Docsify account</p>
    </div>
    
    <form action="" id="signup-form">

        <div class="form-item">
            <input type="text" class="user-name" id="username" required placeholder=" ">
            <label for="username">Enter New Username</label>
        </div>

        <div class="form-item">
            <input type="email" class="user-mail" id="usermail" required placeholder=" ">
            <label for="usermail">Email ID</label>
        </div>

        <div class="form-item">
            <input type="password" class="user-pass" id="userpass" required placeholder=" ">
            <label for="userpass">Create a New Password</label>
        </div>

        <button type="submit" id="submit-btn">Sign In</button>

        <p>Already have an account? <a href="login.html">Log in</a></p>

    </form>
    <script src="../scripts/signin.js"></script>
</div>
</body>
</html>
